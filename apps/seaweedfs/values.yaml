global:
  imagePullSecrets: []

master:
  enabled: true
  replicas: 3
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  data:
    type: persistentVolumeClaim
    size: 5Gi
    storageClass: iscsi-dell-me5-retain
  defaultReplication: "001"
  # Affinity as a string (chart requirement)
  affinity: ""

volume:
  enabled: true
  replicas: 3
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  dataDirs:
    - name: data
      type: persistentVolumeClaim
      size: 50Gi
      storageClass: iscsi-dell-me5-retain
  minFreeSpacePercent: 5
  affinity: ""

filer:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  data:
    type: persistentVolumeClaim
    size: 5Gi
    storageClass: iscsi-dell-me5-retain
  extraEnvironmentVars:
    WEED_LEVELDB2_ENABLED: "false"
    WEED_POSTGRES2_ENABLED: "true"
    WEED_POSTGRES2_HOSTNAME: "gitlab-db-rw.gitlab-db.svc"
    WEED_POSTGRES2_PORT: "5432"
    WEED_POSTGRES2_DATABASE: "seaweedfs_filer"
    WEED_POSTGRES2_USERNAME: "seaweedfs"
    WEED_POSTGRES2_SSLMODE: "disable"
    WEED_POSTGRES2_CONNECTION_MAX_IDLE: "5"
    WEED_POSTGRES2_CONNECTION_MAX_OPEN: "50"
    WEED_POSTGRES2_CONNECTION_MAX_LIFETIME_SECONDS: "600"
  extraSecretEnvironmentVars:
    - name: WEED_POSTGRES2_PASSWORD
      secretName: seaweedfs-db-credentials
      secretKey: password
  affinity: ""

s3:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  createBuckets:
    - name: gitlab-artifacts
    - name: gitlab-uploads
    - name: gitlab-lfs
    - name: gitlab-packages
    - name: gitlab-registry
    - name: gitlab-backups
    - name: gitlab-ci-secure-files
    - name: gitlab-terraform-state
    - name: gitlab-dependency-proxy
    - name: gitlab-pages
