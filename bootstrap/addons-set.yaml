apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-addons
  namespace: efp-argocd # <- change this to your actual argocd namespace
spec:
  generators:
    - list:
        elements:
          - name: metallb
            repo: https://github.io
            chart: metallb
            namespace: metallb-system
          - name: cert-manager
            repo: https://jetstack.io
            chart: cert-manager
            namespace: cert-manager
  template:
    metadata:
      name: '{{name}}'
    spec:
      project: platform # <- you need to create this project or use default one
      sources:
        # Source 1: The Helm Chart
        - repoURL: '{{repo}}'
          chart: '{{name}}'
          targetRevision: HEAD
          helm:
            valueFiles:
              - $values/apps/{{name}}/values.yaml
        # Source 2: Your custom manifests (Issuers, IP Pools)
        - repoURL: https://github.com/cristi0204/argocd-applicationsets # <--- CHANGE THIS
          targetRevision: HEAD
          path: apps/{{name}}
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated: {prune: true, selfHeal: true}
        createNamespace: true
