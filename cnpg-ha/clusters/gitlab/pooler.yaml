apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: gitlab-db-pooler-rw
spec:
  cluster:
    name: gitlab-db
  instances: 2
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "1000"
      default_pool_size: "25"
      min_pool_size: "5"
      reserve_pool_size: "5"
      server_reset_query: "DISCARD ALL"

---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: gitlab-db-pooler-ro
spec:
  cluster:
    name: gitlab-db
  instances: 2
  type: ro
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "1000"
      default_pool_size: "25"
      min_pool_size: "5"
      reserve_pool_size: "5"
      server_reset_query: "DISCARD ALL"
