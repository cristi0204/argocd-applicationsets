apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gitlab-db-access
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: gitlab-db
  policyTypes:
    - Ingress
  ingress:
    # Allow from GitLab namespace
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: gitlab
      ports:
        - protocol: TCP
          port: 5432

    # Allow intra-cluster replication
    - from:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: gitlab-db
      ports:
        - protocol: TCP
          port: 5432
