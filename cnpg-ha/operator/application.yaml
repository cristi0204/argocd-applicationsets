apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-operator
  # namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: 0.23.0             # CNPG operator 1.27.x
    helm:
      releaseName: cnpg
      valuesObject:
        monitoring:
          podMonitorEnabled: false     # set true if you have Prometheus
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
